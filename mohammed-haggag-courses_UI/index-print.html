<!-- Isolate storage for the print page: force the home route and never clobber the user's real state -->
<script>
(function(){
  var mem = { mh_route: JSON.stringify({ page: "home", params: {} }) };
  var shim = {
    getItem: function(k){ return Object.prototype.hasOwnProperty.call(mem,k) ? mem[k] : null; },
    setItem: function(k,v){ mem[k] = String(v); },
    removeItem: function(k){ delete mem[k]; },
    clear: function(){ for (var k in mem) delete mem[k]; },
    key: function(i){ return Object.keys(mem)[i] || null; },
    get length(){ return Object.keys(mem).length; }
  };
  try { Object.defineProperty(window, "localStorage", { configurable:true, get:function(){ return shim; } }); } catch(e){}
})();
</script>

<style>
:root{
  /* ألوان الهوية */
  --navy-900:#0a1f36;
  --navy-800:#0e2944;
  --navy-700:#143655;
  --navy-600:#1d4a6e;
  --navy-500:#2d6189;
  --gold-700:#9c7322;
  --gold:#bf9140;
  --gold-400:#d4ab5e;
  --gold-200:#ead9b3;
  --gold-100:#f4ead2;
  --cream:#faf6ee;
  --cream-2:#f3ecdf;
  --paper:#ffffff;
  --ink:#16202b;
  --ink-2:#41505f;
  --muted:#76838f;
  --line:#e7ddca;
  --line-2:#efe7d6;
  --green:#3f7d5e;
  --danger:#b4452f;
  --shadow-sm:0 1px 2px rgba(14,41,68,.06), 0 2px 6px rgba(14,41,68,.05);
  --shadow:0 4px 14px rgba(14,41,68,.08), 0 12px 36px rgba(14,41,68,.07);
  --shadow-lg:0 10px 30px rgba(14,41,68,.12), 0 30px 70px rgba(14,41,68,.12);
  --r-sm:10px; --r:16px; --r-lg:24px; --r-xl:32px;
  --maxw:1200px;
  --font:'Tajawal',system-ui,sans-serif;
  --serif:'Amiri',serif;
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{
  font-family:var(--font);
  background:var(--cream);
  color:var(--ink);
  line-height:1.7;
  -webkit-font-smoothing:antialiased;
  text-rendering:optimizeLegibility;
}
::selection{background:var(--gold-200);color:var(--navy-900)}
img{max-width:100%;display:block}
button{font-family:inherit;cursor:pointer;border:none;background:none}
a{color:inherit;text-decoration:none}
input,textarea,select{font-family:inherit}
h1,h2,h3,h4{line-height:1.25;font-weight:800;color:var(--navy-900);letter-spacing:-.01em}
.serif{font-family:var(--serif)}
/* أدوات عامة */
.wrap{max-width:var(--maxw);margin:0 auto;padding:0 24px}
.eyebrow{display:inline-flex;align-items:center;gap:8px;font-size:14px;font-weight:700;color:var(--gold-700);letter-spacing:.02em}
.eyebrow::before{content:"";width:24px;height:1.5px;background:var(--gold);display:inline-block}
.section{padding:96px 0}
.section-head{max-width:640px;margin:0 auto 56px;text-align:center}
.section-head h2{font-size:clamp(28px,4vw,42px);margin:14px 0 16px}
.section-head p{color:var(--ink-2);font-size:18px}
/* شريط تمرير لطيف */
::-webkit-scrollbar{width:11px;height:11px}
::-webkit-scrollbar-track{background:var(--cream-2)}
::-webkit-scrollbar-thumb{background:#cdbd9c;border-radius:8px;border:3px solid var(--cream-2)}
::-webkit-scrollbar-thumb:hover{background:var(--gold)}
/* حركات */
@keyframes fadeUp{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes scaleIn{from{opacity:0;transform:scale(.97)}to{opacity:1;transform:scale(1)}}
@keyframes riseIn{from{transform:translateY(18px)}to{transform:none}}
.reveal{animation:riseIn .6s cubic-bezier(.2,.7,.2,1) both}
@media(prefers-reduced-motion:reduce){.reveal{animation:none}}
#root{min-height:100vh}
/* ===== تجاوب ===== */
.burger{display:none}
@media(max-width:1024px){
  .section{padding:72px 0}
  .hero-grid{grid-template-columns:1fr !important;gap:36px !important}
  .hero-photo{max-width:460px;margin:0 auto}
  .stats-grid{grid-template-columns:repeat(3,1fr) !important;gap:32px 16px !important}
  .stat-cell:nth-child(3){border-inline-end:none !important}
  .why-grid{grid-template-columns:repeat(2,1fr) !important}
  .cat-grid{grid-template-columns:repeat(2,1fr) !important}
  .learn-grid,.about-grid,.about-cols,.contact-grid{grid-template-columns:1fr !important;gap:36px !important}
  .testi-grid{grid-template-columns:repeat(2,1fr) !important}
  .steps-grid{grid-template-columns:repeat(2,1fr) !important}
  .plans-grid{grid-template-columns:1fr !important;max-width:480px;margin:0 auto}
  .plan-card{transform:none !important}
  .lesson-grid,.checkout-grid{grid-template-columns:1fr !important}
  .auth-grid{grid-template-columns:1fr !important}
  .auth-aside{display:none !important}
  .dash-stats{grid-template-columns:repeat(2,1fr) !important}
  .foot-grid{grid-template-columns:1fr 1fr !important;gap:32px !important}
  .desk-nav{display:none !important}
  .desk-cta{display:none !important}
  .burger{display:grid !important}
  .step-line{display:none !important}
  .float-card{display:none !important}
}
@media(max-width:600px){
  .wrap{padding:0 18px}
  .section{padding:56px 0}
  .why-grid,.cat-grid,.testi-grid,.steps-grid,.dash-stats,.foot-grid{grid-template-columns:1fr !important}
  .stats-grid{grid-template-columns:repeat(2,1fr) !important}
  .stat-cell{border-inline-end:none !important}
  .learn-list{grid-template-columns:1fr !important}
  h1{font-size:clamp(26px,7vw,34px) !important}
}
@media(min-width:1025px){ .mobile-menu{display:none} }
/* ===== لوحة الأدمن ===== */
@media(max-width:900px){
  .admin-side{display:none !important}
  .admin-topbar{display:flex !important}
  .admin-mobile-nav{display:block !important}
  .admin-kpis{grid-template-columns:repeat(2,1fr) !important}
  .admin-2col{grid-template-columns:1fr !important}
  .admin-selectors{grid-template-columns:1fr !important}
  .admin-content{padding:20px !important}
  .stu-head{display:none !important}
  .stu-row{grid-template-columns:1fr auto !important;row-gap:6px !important}
  .stu-row>*{justify-self:start !important}
}
/* تحميل */
.boot{min-height:100vh;display:grid;place-items:center;background:var(--cream)}
.boot .ring{width:54px;height:54px;border:3px solid var(--gold-200);border-top-color:var(--gold);border-radius:50%;animation:spin 1s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* ============ نسخة الطباعة / PDF ============ */
@media print{
  @page{ size:A4 portrait; margin:10mm; }
  html,body{ background:#fff !important; }
  /* أمانة الألوان + تجميد الحركات على حالتها النهائية */
  *,*::before,*::after{
    -webkit-print-color-adjust:exact !important;
    print-color-adjust:exact !important;
    animation-delay:-99s !important;
    animation-duration:.001s !important;
    animation-iteration-count:1 !important;
    animation-fill-mode:both !important;
    animation-play-state:running !important;
    transition-duration:0s !important;
    scroll-behavior:auto !important;
  }
  /* الهيدر اللاصق يصبح ثابتًا حتى لا يتكرر في كل صفحة */
  header{
    position:static !important;
    background:#faf6ee !important;
    backdrop-filter:none !important;
    -webkit-backdrop-filter:none !important;
    box-shadow:none !important;
  }
  /* عناصر تفاعلية لا معنى لها في الطباعة */
  .burger,.mobile-menu,.boot{ display:none !important; }
  /* تجنّب قص البطاقات بين الصفحات */
  .why-card,.cat-card,.testi-card,.step-card,.plan-card,.faq-item,.stat-cell{
    break-inside:avoid;
  }
}
</style>
</head>

<!-- طباعة تلقائية بعد اكتمال التحميل والرسم -->
<script type="text/babel">
(function(){
  function ready(){
    var root = document.getElementById("root");
    if(!root) return false;
    if(root.querySelector(".boot")) return false;        // ما زال شاشة التحميل
    if(root.children.length === 0) return false;          // لم يُرسم بعد
    if(document.body.scrollHeight < 1500) return false;    // المحتوى لم يكتمل
    return true;
  }
  function whenReady(cb){
    var tries = 0;
    (function poll(){
      tries++;
      if(ready() || tries > 120){ cb(); return; }
      setTimeout(poll, 100);
    })();
  }
  whenReady(function(){
    var fonts = (document.fonts && document.fonts.ready) ? document.fonts.ready : Promise.resolve();
    fonts.then(function(){
      setTimeout(function(){ window.print(); }, 600);
    });
  });
})();
</script>
